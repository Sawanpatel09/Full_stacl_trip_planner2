services:
  - type: web
    name: trip-planner-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: '3.12.0'
      - key: DEBUG
        value: 'false'
      - key: ALLOWED_HOSTS
        value: trip-planner-api.onrender.com
      - key: ORS_API_KEY
        sync: false
